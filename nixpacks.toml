[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "nodejs_20"]

[phases.build]
cmds = [
  "composer install --optimize-autoloader --no-dev",
  "npm ci",
  "npm run build"
]

[start]
cmd = "php artisan migrate --force && php artisan optimize:clear && php artisan serve --host=0.0.0.0 --port=$PORT"
